version: 2
updates:
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
    groups:
      actions:
        patterns: ["*"]

  - package-ecosystem: docker
    directories:
      - /services/api
      - /apps/web
    schedule:
      interval: weekly
    groups:
      docker:
        patterns: ["*"]

  - package-ecosystem: npm
    directory: /
    schedule:
      interval: weekly
    groups:
      npm-minor:
        update-types: ["minor", "patch"]

  - package-ecosystem: uv
    directory: /services/api
    schedule:
      interval: weekly
    groups:
      python-minor:
        update-types: ["minor", "patch"]
