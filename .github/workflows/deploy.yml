# ==============================================================================
# Production Deployment — Bessel
# ==============================================================================
# Builds Docker images and deploys to VPS on push to main.
# Only builds/deploys services whose code has changed.
# Deploys are pinned to the commit SHA — rollback by re-running the workflow
# from an older commit (workflow_dispatch).
# Co-exists with Nous on the same VPS (separate compose project).
#
# Required Secrets:
#   - VPS_HOST, VPS_USER, VPS_SSH_KEY
# ==============================================================================

name: Deploy

on:
  push:
    branches: [master]
    paths:
      - "services/**"
      - "apps/web/**"
      - "packages/**"
      - "docker-compose.prod.yml"
      - "run.sh"
      - ".github/workflows/deploy.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (all, api, worker, web)"
        required: false
        default: "all"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/bessel

jobs:
  # ============================================================================
  # Detect changes
  # ============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.set-outputs.outputs.api }}
      worker: ${{ steps.set-outputs.outputs.worker }}
      web: ${{ steps.set-outputs.outputs.web }}
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Detect changed files
        if: github.event_name != 'workflow_dispatch'
        id: changes
        uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706 # v4.0.2
        with:
          filters: |
            api:
              - 'services/api/**'
              - 'packages/python_client/**'
              - 'pyproject.toml'
              - 'uv.lock'
            worker:
              - 'services/api/**'
              - 'packages/python_client/**'
              - 'pyproject.toml'
              - 'uv.lock'
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'packages/client/**'
              - 'packages/tsconfig/**'
              - 'pnpm-lock.yaml'

      - name: Set outputs
        id: set-outputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
            case "$SERVICE" in
              api)    echo "api=true"  >> $GITHUB_OUTPUT; echo "worker=false" >> $GITHUB_OUTPUT; echo "web=false" >> $GITHUB_OUTPUT ;;
              worker) echo "api=false" >> $GITHUB_OUTPUT; echo "worker=true"  >> $GITHUB_OUTPUT; echo "web=false" >> $GITHUB_OUTPUT ;;
              web)    echo "api=false" >> $GITHUB_OUTPUT; echo "worker=false" >> $GITHUB_OUTPUT; echo "web=true"  >> $GITHUB_OUTPUT ;;
              *)      echo "api=true"  >> $GITHUB_OUTPUT; echo "worker=true"  >> $GITHUB_OUTPUT; echo "web=true"  >> $GITHUB_OUTPUT ;;
            esac
          else
            echo "api=${{ steps.changes.outputs.api }}"       >> $GITHUB_OUTPUT
            echo "worker=${{ steps.changes.outputs.worker }}" >> $GITHUB_OUTPUT
            echo "web=${{ steps.changes.outputs.web }}"       >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Test & Lint (gates all builds)
  # ============================================================================
  test:
    name: Test & Lint
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/api
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: metron
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      BESSEL_POSTGRES_HOST: localhost
      BESSEL_POSTGRES_PORT: 5432
      BESSEL_POSTGRES_USER: postgres
      BESSEL_POSTGRES_PASSWORD: postgres
      BESSEL_POSTGRES_DB: metron
      BESSEL_REDIS_HOST: localhost
      BESSEL_REDIS_PORT: 6379
    steps:
      - uses: actions/checkout@v7
      - uses: astral-sh/setup-uv@11f9893b081a58869d3b5fccaea48c9e9e46f990 # v8.3.2
        with:
          enable-cache: true
      - run: uv sync
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run task test

  # ============================================================================
  # Build API (also used by the worker service)
  # ============================================================================
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.worker == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7
      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=long
      - uses: docker/build-push-action@v7
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================================================
  # Build Web
  # ============================================================================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: [detect-changes, test]
    if: needs.detect-changes.outputs.web == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v7

      - uses: pnpm/action-setup@0ebf47130e4866e96fce0953f49152a61190b271 # v6.0.9
      - uses: actions/setup-node@v7
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web build
        env:
          VITE_API_BASE_URL: /
          VITE_FRONTEND_URL: ${{ secrets.VITE_FRONTEND_URL }}
          VITE_AUTH0_DOMAIN: ${{ secrets.VITE_AUTH0_DOMAIN }}
          VITE_AUTH0_CLIENT_ID: ${{ secrets.VITE_AUTH0_CLIENT_ID }}
          VITE_AUTH0_AUDIENCE: ${{ secrets.VITE_AUTH0_AUDIENCE }}

      - uses: docker/setup-buildx-action@v4
      - uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v6
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=long
      - uses: docker/build-push-action@v7
        with:
          context: apps/web/dist/client
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================================================
  # Deploy to VPS
  # ============================================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [detect-changes, test, build-api, build-web]
    if: |
      always() &&
      needs.test.result == 'success' &&
      !contains(needs.*.result, 'failure') &&
      !contains(needs.*.result, 'cancelled') &&
      (needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.worker == 'true' || needs.detect-changes.outputs.web == 'true')
    environment: production
    steps:
      - uses: actions/checkout@v7

      - name: Copy deploy files to VPS
        uses: appleboy/scp-action@ff85246acaad7bdce478db94a363cd2bf7c90345 # v1.0.0
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,run.sh"
          target: "/home/metron/"

      - name: Deploy
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          TAG: ${{ github.sha }}
          DEPLOY_API: ${{ needs.detect-changes.outputs.api }}
          DEPLOY_WORKER: ${{ needs.detect-changes.outputs.worker }}
          DEPLOY_WEB: ${{ needs.detect-changes.outputs.web }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REGISTRY,IMAGE_PREFIX,TAG,DEPLOY_API,DEPLOY_WORKER,DEPLOY_WEB
          script: |
            set -e
            cd /home/metron
            chmod +x run.sh

            DC="/home/metron/run.sh docker compose -f docker-compose.prod.yml"

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            SERVICES=""
            [ "$DEPLOY_API" = "true" ]    && SERVICES="$SERVICES api"
            [ "$DEPLOY_WORKER" = "true" ] && SERVICES="$SERVICES worker"
            [ "$DEPLOY_WEB" = "true" ]    && SERVICES="$SERVICES web"

            echo "Deploying $TAG:$SERVICES"

            $DC pull $SERVICES

            # Run migrations if API changed
            if [ "$DEPLOY_API" = "true" ]; then
              $DC run --rm api python db.py upgrade
            fi

            $DC up -d --no-deps --wait $SERVICES

            $DC ps

            docker image prune -af \
              --filter "until=168h" \
              --filter "label=org.opencontainers.image.source=https://github.com/${{ github.repository }}"

            echo "Deploy complete ($TAG):$SERVICES"

      - name: Verify
        uses: appleboy/ssh-action@0ff4204d59e8e51228ff73bce53f80d53301dee2 # v1.2.5
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            DC="/home/metron/run.sh docker compose -f docker-compose.prod.yml"
            unhealthy=$($DC ps --format json | jq -r 'select(.Health != "healthy" and .Health != "") | .Service')
            if [ -n "$unhealthy" ]; then
              echo "Unhealthy: $unhealthy"
              $DC logs --tail=50 $unhealthy
              exit 1
            fi
            echo "All services healthy"
