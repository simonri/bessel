# ==============================================================================
# Production Deployment — Metron
# ==============================================================================
# Builds Docker images and deploys to VPS on push to main.
# Only builds/deploys services whose code has changed.
# Co-exists with Nous on the same VPS (separate compose project).
#
# Required Secrets:
#   - VPS_HOST, VPS_USER, VPS_SSH_KEY
# ==============================================================================

name: Deploy

on:
  push:
    branches: [master]
    paths:
      - "services/**"
      - "apps/web/**"
      - "packages/**"
      - "docker-compose.prod.yml"
      - "Caddyfile"
      - ".github/workflows/deploy.yml"
      - "pyproject.toml"
      - "uv.lock"
      - "pnpm-lock.yaml"
  workflow_dispatch:
    inputs:
      service:
        description: "Service to deploy (all, api, worker, web)"
        required: false
        default: "all"

concurrency:
  group: deploy-production
  cancel-in-progress: false

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ${{ github.repository_owner }}/metron

jobs:
  # ============================================================================
  # Detect changes
  # ============================================================================
  detect-changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    outputs:
      api: ${{ steps.set-outputs.outputs.api }}
      worker: ${{ steps.set-outputs.outputs.worker }}
      web: ${{ steps.set-outputs.outputs.web }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Detect changed files
        if: github.event_name != 'workflow_dispatch'
        id: changes
        uses: dorny/paths-filter@v3
        with:
          filters: |
            api:
              - 'services/api/**'
              - 'packages/python_client/**'
              - 'pyproject.toml'
              - 'uv.lock'
            worker:
              - 'services/api/**'
              - 'packages/python_client/**'
              - 'pyproject.toml'
              - 'uv.lock'
            web:
              - 'apps/web/**'
              - 'packages/ui/**'
              - 'packages/client/**'
              - 'packages/tsconfig/**'
              - 'pnpm-lock.yaml'

      - name: Set outputs
        id: set-outputs
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            SERVICE="${{ github.event.inputs.service }}"
            case "$SERVICE" in
              api)    echo "api=true"  >> $GITHUB_OUTPUT; echo "worker=false" >> $GITHUB_OUTPUT; echo "web=false" >> $GITHUB_OUTPUT ;;
              worker) echo "api=false" >> $GITHUB_OUTPUT; echo "worker=true"  >> $GITHUB_OUTPUT; echo "web=false" >> $GITHUB_OUTPUT ;;
              web)    echo "api=false" >> $GITHUB_OUTPUT; echo "worker=false" >> $GITHUB_OUTPUT; echo "web=true"  >> $GITHUB_OUTPUT ;;
              *)      echo "api=true"  >> $GITHUB_OUTPUT; echo "worker=true"  >> $GITHUB_OUTPUT; echo "web=true"  >> $GITHUB_OUTPUT ;;
            esac
          else
            echo "api=${{ steps.changes.outputs.api }}"       >> $GITHUB_OUTPUT
            echo "worker=${{ steps.changes.outputs.worker }}" >> $GITHUB_OUTPUT
            echo "web=${{ steps.changes.outputs.web }}"       >> $GITHUB_OUTPUT
          fi

  # ============================================================================
  # Build API
  # ============================================================================
  build-api:
    name: Build API
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.api == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-api
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================================================
  # Build Worker
  # ============================================================================
  build-worker:
    name: Build Worker
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.worker == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-worker
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: services/api/Dockerfile.worker
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================================================
  # Build Web
  # ============================================================================
  build-web:
    name: Build Web
    runs-on: ubuntu-latest
    needs: detect-changes
    if: needs.detect-changes.outputs.web == 'true'
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_PREFIX }}-web
          tags: |
            type=raw,value=latest,enable={{is_default_branch}}
            type=sha,prefix=,format=short
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: apps/web/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VITE_API_BASE_URL=/
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

  # ============================================================================
  # Deploy to VPS
  # ============================================================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: [detect-changes, build-api, build-worker, build-web]
    if: |
      always() &&
      !contains(needs.*.result, 'failure') &&
      (needs.detect-changes.outputs.api == 'true' || needs.detect-changes.outputs.worker == 'true' || needs.detect-changes.outputs.web == 'true')
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Copy compose + Caddyfile to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          source: "docker-compose.prod.yml,Caddyfile"
          target: "/home/metron/"

      - name: Deploy
        uses: appleboy/ssh-action@v1.0.3
        env:
          REGISTRY: ${{ env.REGISTRY }}
          IMAGE_PREFIX: ${{ env.IMAGE_PREFIX }}
          TAG: latest
          DEPLOY_API: ${{ needs.detect-changes.outputs.api }}
          DEPLOY_WORKER: ${{ needs.detect-changes.outputs.worker }}
          DEPLOY_WEB: ${{ needs.detect-changes.outputs.web }}
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          envs: REGISTRY,IMAGE_PREFIX,TAG,DEPLOY_API,DEPLOY_WORKER,DEPLOY_WEB
          script: |
            set -e
            cd /home/metron

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

            SERVICES=""
            [ "$DEPLOY_API" = "true" ]    && SERVICES="$SERVICES api"
            [ "$DEPLOY_WORKER" = "true" ] && SERVICES="$SERVICES worker"
            [ "$DEPLOY_WEB" = "true" ]    && SERVICES="$SERVICES web"

            echo "Deploying:$SERVICES"

            for svc in $SERVICES; do
              docker compose -f docker-compose.prod.yml pull $svc || true
            done

            # Run migrations if API changed
            if [ "$DEPLOY_API" = "true" ]; then
              docker compose -f docker-compose.prod.yml run --rm api python db.py upgrade
            fi

            # Always ensure caddy picks up latest Caddyfile
            docker compose -f docker-compose.prod.yml up -d --no-deps caddy $SERVICES

            sleep 30
            docker compose -f docker-compose.prod.yml ps

            docker image prune -af --filter "until=168h"

            echo "Deploy complete:$SERVICES"

      - name: Verify
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USER }}
          key: ${{ secrets.VPS_SSH_KEY }}
          script: |
            cd /home/metron
            unhealthy=$(docker compose -f docker-compose.prod.yml ps --format json | jq -r 'select(.Health != "healthy" and .Health != "") | .Service')
            if [ -n "$unhealthy" ]; then
              echo "Unhealthy: $unhealthy"
              docker compose -f docker-compose.prod.yml logs --tail=50 $unhealthy
              exit 1
            fi
            echo "All services healthy"
