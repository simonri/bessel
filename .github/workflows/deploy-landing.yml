# ==============================================================================
# Landing Page Deployment — Bessel
# ==============================================================================
# Builds the static landing site and deploys it to Cloudflare Pages.
#
# Required Secrets:
#   - CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID
# ==============================================================================

name: Deploy Landing

on:
  push:
    branches: [master]
    paths:
      - "apps/landing/**"
      - "pnpm-lock.yaml"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch: {}

concurrency:
  group: deploy-landing
  cancel-in-progress: true

jobs:
  deploy:
    name: Build & Deploy
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @bessel/landing build

      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v4
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy apps/landing/dist/client --project-name=bessel-landing --branch=master
