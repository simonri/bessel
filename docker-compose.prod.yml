# ==============================================================================
# Production Docker Compose for Metron
# ==============================================================================
# Deployed to VPS, accessible only via Tailscale.
# Uses shared Traefik reverse proxy (from Nous stack) with IP allowlist
# restricting access to Tailscale CGNAT range.
#
# Usage:
#   docker compose -f docker-compose.prod.yml up -d
#   docker compose -f docker-compose.prod.yml logs -f
#
# Prerequisites:
#   - Create .env with required variables (see .env.example)
#   - Traefik running on the `web` network (from Nous stack)
#   - Tailscale running on host
# ==============================================================================

x-db-env: &db_env
  METRON_POSTGRES_USER: ${METRON_POSTGRES_USER}
  METRON_POSTGRES_PASSWORD: ${METRON_POSTGRES_PASSWORD}
  METRON_POSTGRES_DB: ${METRON_POSTGRES_DB}
  METRON_POSTGRES_PORT: 5432
  METRON_POSTGRES_HOST: metron-postgres

x-redis-env: &redis_env
  METRON_REDIS_HOST: metron-redis
  METRON_REDIS_PORT: 6379

services:
  # ============================================================================
  # Database
  # ============================================================================
  metron-postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${METRON_POSTGRES_USER}
      POSTGRES_PASSWORD: ${METRON_POSTGRES_PASSWORD}
      POSTGRES_DB: ${METRON_POSTGRES_DB}
    volumes:
      - metron_postgres_data:/var/lib/postgresql/data
    command:
      - "postgres"
      - "-c"
      - "max_connections=100"
      - "-c"
      - "shared_buffers=128MB"
      - "-c"
      - "effective_cache_size=512MB"
      - "-c"
      - "checkpoint_completion_target=0.9"
      - "-c"
      - "random_page_cost=1.1"
      - "-c"
      - "effective_io_concurrency=200"
      - "-c"
      - "log_min_duration_statement=1000"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -q -d ${METRON_POSTGRES_DB} -U ${METRON_POSTGRES_USER}"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - metron-internal

  # ============================================================================
  # Cache & Job Queue
  # ============================================================================
  metron-redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: >
      redis-server
      --appendonly yes
      --maxmemory 128mb
      --maxmemory-policy allkeys-lru
    volumes:
      - metron_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    networks:
      - metron-internal

  # ============================================================================
  # API
  # ============================================================================
  api:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-simonri/metron}-api:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      metron-postgres:
        condition: service_healthy
      metron-redis:
        condition: service_healthy
    environment:
      <<: [*db_env, *redis_env]
      METRON_ENV: production
      METRON_LOG_LEVEL: INFO
      METRON_CORS_ORIGINS: ${METRON_CORS_ORIGINS}
      METRON_FRONTEND_BASE_URL: ${METRON_FRONTEND_BASE_URL}
      METRON_GOOGLE_PLACES_API_KEY: ${METRON_GOOGLE_PLACES_API_KEY:-}
      METRON_SENTRY_DSN: ${METRON_SENTRY_DSN:-}
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      # API routes
      - "traefik.http.routers.metron-api.rule=Host(`vps.tailca3fd9.ts.net`) && (PathPrefix(`/v1`) || Path(`/healthz`) || Path(`/openapi.json`))"
      - "traefik.http.routers.metron-api.entrypoints=websecure"
      - "traefik.http.routers.metron-api.middlewares=metron-tailscale@docker"
      - "traefik.http.services.metron-api.loadbalancer.server.port=8000"
      # Tailscale-only access
      - "traefik.http.middlewares.metron-tailscale.ipallowlist.sourcerange=100.64.0.0/10"
    networks:
      - metron-internal
      - web

  # ============================================================================
  # Background Worker
  # ============================================================================
  worker:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-simonri/metron}-worker:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      metron-postgres:
        condition: service_healthy
      metron-redis:
        condition: service_healthy
    environment:
      <<: [*db_env, *redis_env]
      METRON_ENV: production
      METRON_LOG_LEVEL: INFO
      METRON_SENTRY_DSN: ${METRON_SENTRY_DSN:-}
    networks:
      - metron-internal

  # ============================================================================
  # Web Frontend
  # ============================================================================
  web:
    image: ${REGISTRY:-ghcr.io}/${IMAGE_PREFIX:-simonri/metron}-web:${TAG:-latest}
    restart: unless-stopped
    depends_on:
      - api
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=web"
      - "traefik.http.routers.metron-web.rule=Host(`vps.tailca3fd9.ts.net`)"
      - "traefik.http.routers.metron-web.entrypoints=websecure"
      - "traefik.http.routers.metron-web.middlewares=metron-tailscale@docker"
      - "traefik.http.routers.metron-web.priority=1"
      - "traefik.http.services.metron-web.loadbalancer.server.port=3000"
    networks:
      - metron-internal
      - web

volumes:
  metron_postgres_data:
  metron_redis_data:

networks:
  metron-internal:
    driver: bridge
  web:
    external: true
