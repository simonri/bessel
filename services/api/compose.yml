services:
  redis:
    image: redis
    ports:
      - "${BESSEL_REDIS_PORT}:6379"

  db:
    image: postgres:15.1-bullseye
    environment:
      - POSTGRES_USER=${BESSEL_POSTGRES_USER}
      - POSTGRES_PASSWORD=${BESSEL_POSTGRES_PASSWORD}
      - POSTGRES_DB=${BESSEL_POSTGRES_DB}
      - POSTGRES_PORT=${BESSEL_POSTGRES_PORT}
    volumes:
      - postgres_data:/var/lib/postgresql/data/
    ports:
      - "${BESSEL_POSTGRES_PORT}:5432"
    expose:
      - ${BESSEL_POSTGRES_PORT}
    healthcheck:
      test:
        ["CMD", "pg_isready", "-q", "-d", "${BESSEL_POSTGRES_DB}", "-U", "${BESSEL_POSTGRES_USER}"]
      timeout: 40s
      interval: 2s
      retries: 20

volumes:
  postgres_data:
